<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sistema Frota</title>

<style>

body{

    margin:0;
    padding:0;

    font-family: Arial, Helvetica, sans-serif;

    background-image: url("/static/fundo.jpg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;

    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

}

.login-box{

    background: rgba(0,0,0,0.7);

    padding:40px;

    border-radius:10px;

    text-align:center;

    width:300px;

    color:white;

}

input{

    width:100%;
    padding:10px;

    margin:10px 0;

    border:none;

    border-radius:5px;

}

button{

    width:100%;
    padding:10px;

    border:none;

    border-radius:5px;

    background:#2ecc71;

    color:white;

    font-size:16px;

    cursor:pointer;

}

button:hover{

    background:#27ae60;

}

</style>

</head>

<body>

<div class="login-box">

<h2>Sistema Frota</h2>

<form method="POST">

<input type="text" name="usuario" placeholder="Usuário" required>

<input type="password" name="senha" placeholder="Senha" required>

<button type="submit">Entrar</button>

</form>

</div>

</body>

</html>
