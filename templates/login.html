<!DOCTYPE html>
<html>
<head>

<title>Login</title>

<style>

body{

font-family:Arial;

background-image:url("/static/fundo.jpg");

background-size:600px;

background-repeat:no-repeat;

background-position:center;

background-color:#f0f0f0;

display:flex;

justify-content:flex-end;

align-items:center;

height:100vh;

padding-right:80px;

}

.box{

background:white;

padding:30px;

border-radius:10px;

width:300px;

box-shadow:0 0 10px rgba(0,0,0,0.2);

}

input{

width:100%;

padding:8px;

margin-bottom:10px;

}

button{

width:100%;

padding:10px;

background:#007bff;

color:white;

border:none;

}

</style>

</head>

<body>

<div class="box">

<h2>Login</h2>

<form method="POST">

<input type="text" name="usuario" placeholder="Usuário">

<input type="password" name="senha" placeholder="Senha">

<button type="submit">Entrar</button>

</form>

</div>

</body>
</html>
