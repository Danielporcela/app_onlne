
<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel</title>

<style>

body{

    margin:0;
    padding:0;

    font-family: Arial, Helvetica, sans-serif;

    background-image: url("/static/img_fundo.png");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;

    min-height:100vh;

}

.container{

    background: rgba(0,0,0,0.65);

    margin:20px;

    padding:20px;

    border-radius:10px;

    color:white;

}

h1{

    text-align:center;

}

table{

    width:100%;

    border-collapse: collapse;

}

th,td{

    padding:10px;

    text-align:center;

}

th{

    background:#2c3e50;

}

td{

    background:rgba(255,255,255,0.1);

}

input{

    padding:8px;

}

button{

    padding:8px 15px;

    border:none;

    background:#27ae60;

    color:white;

    cursor:pointer;

}

button:hover{

    background:#219150;

}

</style>

</head>

<body>

<div class="container">

<h1>Painel de Controle</h1>

<form action="/cadastrar" method="POST">

<input type="text" name="codigo" placeholder="Código do setor" required>

<button type="submit">Cadastrar</button>

</form>

<br>

<form action="/upload" method="POST" enctype="multipart/form-data">

<input type="file" name="arquivos" multiple>

<button type="submit">Importar Planilhas</button>

</form>

<br>

<a href="/resetar">Resetar Dados</a>

<br><br>

<table>

<tr>

<th>Setor</th>
<th>Total</th>
<th>Horas</th>
<th>Ação</th>

</tr>

{% for s in setores %}

<tr>

<td>{{ s.codigo }}</td>
<td>{{ "%.2f"|format(s.total) }}</td>
<td>{{ s.horas_formatadas }}</td>

<td>

<a href="/excluir/{{ s.id }}">Excluir</a>

</td>

</tr>

{% endfor %}

</table>

</div>

</body>

</html>
